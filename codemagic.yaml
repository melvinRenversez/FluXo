workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get dependencies
        script: flutter pub get

      - name: Build IPA (Release)
        script: flutter build ipa --release -t lib/main.dart

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive