<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<style>
  body {
    font-family: Arial, sans-serif;

    background: #202020;
    color: #eee;

    margin: 0;
    padding: 20px;

    cursor: url(./cursor.cur) 0 0, auto;

    height: 100dvh;
  }

  /* TABLE */

  table {
    width: 100%;
    border-collapse: collapse;

    background: #151515;

    border-radius: 12px;
    overflow: hidden;


  table-layout: fixed;
  }

  /* HEADER */

  thead {
    background: #2a2a2a;
  }

  thead th {
    padding: 15px;

    text-align: left;

    color: #eee;

    font-size: 14px;
    font-weight: bold;

    border-bottom: 1px solid #303030;
  }

  /* ROWS */

  tbody tr {
    border-bottom: 1px solid #252525;

    transition: background 0.2s ease;
  }

  tbody tr:hover {
    background: #1f1f1f;
  }

  tbody td {
    padding: 15px;

    color: #ddd;

    font-size: 14px;

    max-width: 250px;

    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* URL */

  tbody td:nth-child(2) {
    color: #aaa;
  }

  /* DURATION */

  tbody td:nth-child(3) {
    width: 100px;
  }

  tbody td:nth-child(3) span {
    background: #303030;

    padding: 6px 12px;

    border-radius: 20px;

    display: inline-block;

    font-size: 13px;
  }

  /* STATUS */

  tbody td:nth-child(4) {
    font-weight: bold;
  }

  .title {
    font-weight: bold;
  }

  /* SCROLL */

  ::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }

  ::-webkit-scrollbar-track {
    background: #151515;
  }

  ::-webkit-scrollbar-thumb {
    background: #3a3a3a;
    border-radius: 10px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: #4a4a4a;
  }

  img {
    width: 50px;
  }



  input {
    background: transparent;

    border: none;
    outline: none;

    width: 100%;

    color: #eee;
  }

  td.trId {
    width: 40px;
    text-align: center;
    white-space: nowrap;
  }

  td.trImage {
    width: 60px;
    text-align: center;
    padding: 5px;
  }

  .trTitle {
    flex: 1;
  }
</style>

<body>
  <table>
    <thead>
      <tr>
        <th>id</th>
        <th>Image</th>
        <th>Title</th>
      </tr>
    </thead>
    <tbody id="list">
    </tbody>
  </table>
</body>

<script>
  function getFilms() {
    fetch("/getFilms")
      .then(response => response.json())
      .then(data => {

        console.log(data);

        data.forEach(film => {

          const template = `
          <tr>
            <td class="trId">${film.id}</td>
            <td class="trImage"><img src="${film.image}" alt="${film.title}"></td>
            <td class="trTitle">${film.title}</td>
            </tr>
            `

          document.getElementById("list").innerHTML += template;

        });

      })
      .catch(error => {
        console.error("Error fetching films:", error);
      });
  }

  getFilms();
</script>

</html>
