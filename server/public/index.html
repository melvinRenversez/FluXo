<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<style>
  body {
    font-family: Arial, sans-serif;

    background: #202020;
    color: #eee;

    margin: 0;
    padding: 20px;

    cursor: url(./cursor.cur) 0 0, auto;

    height: 100dvh;
  }

  /* TABLE */

  table {
    width: 100%;
    border-collapse: collapse;

    background: #151515;

    border-radius: 12px;
    overflow: hidden;
  }

  /* HEADER */

  thead {
    background: #2a2a2a;
  }

  thead th {
    padding: 15px;

    text-align: left;

    color: #eee;

    font-size: 14px;
    font-weight: bold;

    border-bottom: 1px solid #303030;
  }

  /* ROWS */

  tbody tr {
    border-bottom: 1px solid #252525;

    transition: background 0.2s ease;
  }

  tbody tr:hover {
    background: #1f1f1f;
  }

  tbody td {
    padding: 15px;

    color: #ddd;

    font-size: 14px;

    max-width: 250px;

    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* URL */

  tbody td:nth-child(2) {
    color: #aaa;
  }

  /* DURATION */

  tbody td:nth-child(3) {
    width: 100px;
  }

  tbody td:nth-child(3) span {
    background: #303030;

    padding: 6px 12px;

    border-radius: 20px;

    display: inline-block;

    font-size: 13px;
  }

  /* STATUS */

  tbody td:nth-child(4) {
    font-weight: bold;
  }

  .title {
    font-weight: bold;
  }

  /* SCROLL */

  ::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }

  ::-webkit-scrollbar-track {
    background: #151515;
  }

  ::-webkit-scrollbar-thumb {
    background: #3a3a3a;
    border-radius: 10px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: #4a4a4a;
  }



  .switchContainer {
    width: 100%;

    display: flex;
    justify-content: end;

    margin-bottom: 20px;
  }

  .switch {
    height: 30px;
    width: 60px;
    background-color: #303030;
    border-radius: 30px;
    position: relative;
    cursor: pointer;


    margin-right: 10px;
  }

  .switch .ball {
    height: 20px;
    width: 20px;
    background-color: red;
    border-radius: 50%;
    position: absolute;
    top: 5px;
    left: 5px;
    transition: transform 0.3s ease, background-color 0.3s ease;
  }

  .switch.active .ball {
    transform: translateX(30px);
  }

  .ball.active {
    background-color: limegreen;
  }


  input {
    background: transparent;

    border: none;
    outline: none;

    width: 100%;

    color: #eee;
  }

</style>


<div class="switchContainer">
  <div class="switch" id="switch">
    <div class="ball"></div>
  </div>
</div>



<body>
  <table>
    <thead>
      <tr>
        <th>id</th>
        <th>Title</th>
        <th>URL</th>
        <th>Duration</th>
        <th>Status</th>
        <th>Download</th>
      </tr>
    </thead>
    <tbody id="list">
    </tbody>
  </table>
</body>
<script>
  let nbRows = 0;
  let asFinish = false;
  let currentDownloadId = null;
  let isUpdate = false;

  function getLinks() {
    fetch("/getLinks")
      .then(response => response.json())
      .then(data => {
        console.log(data);

        if (data.length === nbRows && asFinish == false && !isUpdate) {
          return;
        }

        isUpdate = false;

        const list = document.getElementById("list");

        let temp = "";

        nbRows = data.length;


        data.forEach(element => {
          console.log(element);

          const start = new Date(element.startDownload_at);
          const end = new Date(element.endDownload_at);


          const lastRow = (element.status == "Completed") ? `Donloaded on ${formatDuration((end - start) / 1000)} ` : "Waitting...";


          let template = `
						<tr id="row">
							<td>${element.id}</td>
							<td class="title" id="title-${element.id}">${element.title}</td>
							<td title="${element.url}">${element.url}</td>
							<td><span>${formatDuration(element.duration)}</span></td>
							<td>${element.status}</td>
							<td id="${element.id}">${lastRow}</td>
						</tr>
					`;

          temp += template;
        });

        list.innerHTML = temp;

        initEvent();

      })
      .catch(error => {
        console.error("Error fetching links:", error);
      });
  }

  function initEvent() {
    const allTitles = document.querySelectorAll(".title");

    allTitles.forEach(title => {
      title.addEventListener("dblclick", () => {
        console.log("double click on ", title.innerText);

        const template = `
          <form onsubmit="event.preventDefault(); updateTitle(this);">
            <input type="hidden" name="id" value="${title.id.split("-")[1]}">
            <input type="text" value="${title.innerText}">

            </form>
        `
        title.innerHTML = template;

        // focus l input
        const input = title.querySelector('input[type="text"]');
        input.focus();

        // supprimer l input si on le focus plus 
        input.addEventListener("blur", () => {
          title.innerHTML = input.value;
        });



      });
    });
  }

  function updateTitle(form) {
    const id = form.querySelector('input[name="id"]').value;
    const newTitle = form.querySelector('input[type="text"]').value;

    fetch("/updateTitle", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          id: id,
          title: newTitle
        })
      })
      .then(response => response.json())
      .then(data => {
        console.log("Title updated successfully");
        isUpdate = true;
        getLinks();
      })
      .catch(error => {
        console.error("Error updating title:", error);
      });
  }

  function getCurrentDownload() {
    fetch("/getCurrentDownload")
      .then(response => response.json())
      .then(data => {

        if (data.progress == null) return;

        if (currentDownloadId !== data.id) {
          currentDownloadId = data.id;
          asFinish = false;
        }

        const currentRow = document.getElementById(data.id);

        if (data.progress == 100) {
          asFinish = true;
        }

        if (currentRow) {
          currentRow.innerHTML = data.progress + "%";
        }

      })
      .catch(error => {
        console.error("Error fetching current download:", error);
      });
  }

  function formatDuration(seconds) {

    seconds = Math.floor(seconds);

    const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
    const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
    const s = (seconds % 60).toString().padStart(2, '0');

    let formated = "";

    console.log(h, m, s);

    if (h > 0) {
      console.log("enter h");
      formated += h + "h";
    }
    if (m > 0) {
      console.log("enter m");
      formated += m + "m";
    }

    formated += s + "s";


    console.log("result :", formated);

    return formated;
  }



  const switchElement = document.getElementById("switch");
  const ball = document.querySelector(".ball");
  let switchStatus = false;

  function getDownloadStatus() {
    fetch("/getDownloadStatus")
      .then(response => response.json())
      .then(data => {
        switchStatus = data.canDownload;
        renderSwitch();
      })
      .catch(error => {
        console.error("Error updating status:", error);
      });
  }

  function renderSwitch() {
    if (switchStatus) {
      switchElement.classList.add("active");
      ball.classList.add("active");
    } else {
      switchElement.classList.remove("active");
      ball.classList.remove("active");
    }
  }



  switchElement.addEventListener("click", () => {
    fetch("/setDownloadStatus", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          status: !switchStatus
        })
      })
      .then(response => response.json())
      .then(data => {})
      .catch(error => {
        console.error("Error updating status:", error);
      });

  })



  getLinks();
  setInterval(getLinks, 5000);
  getCurrentDownload();
  setInterval(getCurrentDownload, 2000);
  getDownloadStatus();
  setInterval(getDownloadStatus, 1000);
</script>

</html>
