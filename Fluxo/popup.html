<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<style>
	body {
		font-family: Arial, sans-serif;

		background: #202020;
		color: #eee;

		width: 400px;
		height: 600px;

	}

	.list {
		display: flex;
		flex-direction: column;
		gap: 10px;

		padding: 10px;

		background: #151515;
	}

	.element {
		display: flex;
		flex-direction: column;
		gap: 5px;

		padding: 10px;


	}

	.title {
		font-weight: bold;

		color: #eee;
	}

	.url {
		text-overflow: ellipsis;
		white-space: nowrap;
		overflow: hidden;

		color: #eee;
	}

	.duration {
		margin-top: 30px;

		background: #303030;

		color: #eee;

		display: flex;
		justify-content: center;

		width: min-content;
		padding: 10px 20px;

		border-radius: 30px;
	}

	.bottom {
		display: flex;
		gap: 10px;

		margin-top: 20px;

		width: 100%;
		justify-content: space-between;
	}

	.bottom .custom-select input {
		background: #303030;
		color: #eee;

		border: none;
		outline: none;

		border-bottom: 1px solid #eee;

		padding: 5px 10px;

		max-width: 250px;
		width: 250px;

	}

	.bottom button {
		background: #303030;
		color: #eee;

		padding: 5px 10px;

		border-radius: 5px;

		border: none;
		cursor: pointer;
	}

	.save-btn:disabled {
		background: #505050;
		color: #aaa;

		cursor: not-allowed;
	}

	#resetButton {
		position: absolute;
		bottom: 20px;
		right: 20px;

		background: #303030;
		color: #eee;

		padding: 10px 20px;

		border-radius: 5px;

		border: none;
		cursor: pointer;
	}
</style>

<body>

	<div class="list" id="list">

	</div>


	<button id="resetButton"> reset </button>


	<script src="popup.js" defer></script>
</body>

</html>
